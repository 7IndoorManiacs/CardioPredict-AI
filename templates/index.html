<html>
<head>
    <title>CardioPredict AI</title>

    

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="bg-light">

<div class="container mt-5">

```
<div class="card shadow p-4">

    <h1 class="text-center text-danger">
        ❤️ CardioPredict AI
    </h1>

    <h4 class="text-center text-muted">
        Heart Disease Risk Assessment
    </h4>

    <hr>

    <form action="/predict" method="POST">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Age</label>
                <input type="number" class="form-control" name="age" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Sex</label>
                <select class="form-control" name="sex">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Chest Pain Type</label>
                <select class="form-control" name="cp">
                    <option value="typical angina">Typical Angina</option>
                    <option value="atypical angina">Atypical Angina</option>
                    <option value="non-anginal">Non-Anginal</option>
                    <option value="asymptomatic">Asymptomatic</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Resting Blood Pressure</label>
                <input type="number" class="form-control" name="trestbps" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Cholesterol</label>
                <input type="number" class="form-control" name="chol" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Fasting Blood Sugar > 120 mg/dl</label>
                <select class="form-control" name="fbs">
                    <option value="True">Yes</option>
                    <option value="False">No</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Rest ECG</label>
                <select class="form-control" name="restecg">
                    <option value="normal">Normal</option>
                    <option value="lv hypertrophy">LV Hypertrophy</option>
                    <option value="st-t abnormality">ST-T Abnormality</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Maximum Heart Rate</label>
                <input type="number" class="form-control" name="thalch" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Exercise Induced Angina</label>
                <select class="form-control" name="exang">
                    <option value="False">No</option>
                    <option value="True">Yes</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Old Peak</label>
                <input type="number" step="0.1" class="form-control" name="oldpeak" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Slope</label>
                <select class="form-control" name="slope">
                    <option value="upsloping">Upsloping</option>
                    <option value="flat">Flat</option>
                    <option value="downsloping">Downsloping</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Number of Major Vessels (CA)</label>
                <input type="number" min="0" max="4" class="form-control" name="ca" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Thal</label>
                <select class="form-control" name="thal">
                    <option value="normal">Normal</option>
                    <option value="fixed defect">Fixed Defect</option>
                    <option value="reversable defect">Reversible Defect</option>
                </select>
            </div>

        </div>

        <button class="btn btn-danger w-100 mt-3" type="submit">
            Predict Heart Disease Risk
        </button>

    </form>

</div>
```

</div>

</body>
</html>
